<mat-card class="poll-preview-card" shadow-sm>
  <mat-card-header>
    <mat-card-title><h3>{{ poll?.title }}</h3></mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p class="description">{{ poll?.description }}</p>
  </mat-card-content>

  <mat-card-footer class="poll-footer">
    <div class="expiration-info">
      <mat-icon inline>timer</mat-icon>
      <span>Lejárat: {{ poll?.expiresAt | date:'yyyy.MM.dd HH:mm' }}</span>
    </div>
  </mat-card-footer>
</mat-card>
